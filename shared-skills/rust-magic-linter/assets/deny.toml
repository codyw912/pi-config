# ============================================
# CARGO-DENY CONFIGURATION
# ============================================
# Place this file at .cargo/deny.toml in your project
# Run with: cargo deny check
# Install with: cargo install cargo-deny
#
# Prevents AI agents from adding problematic dependencies

[graph]
# Specify targets if you only build for certain platforms
# targets = ["x86_64-unknown-linux-gnu", "aarch64-apple-darwin"]

# ============================================
# LICENSE CHECKING
# ============================================
[licenses]
# List of allowed licenses - be explicit about what your project accepts
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",          # Mozilla Public License (weak copyleft, usually OK)
]

# Confidence threshold for license detection
confidence-threshold = 0.8

# Clarify licenses for specific crates if needed
# [[licenses.clarify]]
# name = "ring"
# expression = "MIT AND ISC AND OpenSSL"
# license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================
# CRATE BANS
# ============================================
[bans]
# How to handle multiple versions of the same crate
multiple-versions = "warn"

# Deny wildcard dependencies (e.g., foo = "*")
wildcards = "deny"

# Allow build dependencies to have multiple versions
# (they don't affect runtime)
workspace-default-features = "allow"
external-default-features = "allow"

# Highlight specific crates for review
highlight = "all"

# Skip certain crates from duplicate checking
# skip = [{ name = "windows-sys" }]

# Deny specific crates entirely
# deny = [
#     { name = "openssl", wrappers = ["openssl-sys"] },
# ]

# ============================================
# SECURITY ADVISORIES
# ============================================
[advisories]
# The database of security advisories
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Deny crates with known vulnerabilities
vulnerability = "deny"

# Warn about unmaintained crates
unmaintained = "warn"

# Warn about yanked crates
yanked = "warn"

# How to handle crates that have been marked as unsound
unsound = "deny"

# Ignore specific advisories if you've assessed the risk
# ignore = ["RUSTSEC-2020-0071"]

# ============================================
# SOURCE CHECKING
# ============================================
[sources]
# Require all crates come from crates.io by default
unknown-registry = "deny"
unknown-git = "deny"

# Allow specific git sources if needed
# [sources.allow-git]
# ["https://github.com/example/crate"]

# Allow specific registries
[sources.allow-registry]
# ["https://example-registry.com"]
